version: '3.8'

# Revamped compose — runs the feature/revamped branch on separate ports.
# On the server, run:  docker compose -f docker-compose.revamped.yml up -d
#
# Ports:
#   Backend API  → :3001
#   Web UI       → :8081  (nginx is embedded inside the web image — no separate nginx container needed)
#   Postgres     → internal only (exec_postgres_revamped)

services:

  postgres_revamped:
    image: postgres:15-alpine
    container_name: exec_postgres_revamped
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${REVAMPED_DB:-exec_revamped_db}
    volumes:
      - postgres_revamped_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exec_user} -d ${REVAMPED_DB:-exec_revamped_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_revamped:
    image: docker.io/${DOCKER_USERNAME}/exec-backend:revamped
    container_name: exec_backend_revamped
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-exec_user}:${POSTGRES_PASSWORD}@postgres_revamped:5432/${REVAMPED_DB:-exec_revamped_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@yourdomain.com}
      FRONTEND_URL: ${REVAMPED_FRONTEND_URL}
      APP_URL: ${REVAMPED_APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres_revamped:
        condition: service_healthy
    volumes:
      - uploads_revamped_data:/app/uploads

  web_revamped:
    image: docker.io/${DOCKER_USERNAME}/exec-web:revamped
    container_name: exec_web_revamped
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend_revamped

volumes:
  postgres_revamped_data:
  uploads_revamped_data:
