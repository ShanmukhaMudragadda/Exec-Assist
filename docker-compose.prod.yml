version: '3.8'

# Production compose — uses pre-built images pushed from your local machine.
# On the server, run:  docker compose -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:15-alpine
    container_name: exec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-executive_tasks_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exec_user} -d ${POSTGRES_DB:-executive_tasks_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: docker.io/${DOCKER_USERNAME}/exec-backend:latest
    container_name: exec_backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-exec_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-executive_tasks_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@yourdomain.com}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  web:
    image: docker.io/${DOCKER_USERNAME}/exec-web:latest
    container_name: exec_web
    restart: unless-stopped
    depends_on:
      - backend

  mobile-web:
    image: docker.io/${DOCKER_USERNAME}/exec-mobile-web:latest
    container_name: exec_mobile_web
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: exec_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - web
      - mobile-web

volumes:
  postgres_data:
  uploads_data:
