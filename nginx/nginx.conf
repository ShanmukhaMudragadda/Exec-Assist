events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # ── Web app — http://localhost ───────────────────────────────────────────────
  server {
    listen 80;
    server_name localhost yourdomain.com www.yourdomain.com;

    location / {
      proxy_pass http://web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── Mobile web app — http://localhost:8080 ───────────────────────────────────
  server {
    listen 8080;
    server_name localhost app.yourdomain.com;

    location / {
      proxy_pass http://mobile-web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── Backend API — http://localhost:3001 (or api.yourdomain.com) ──────────────
  server {
    listen 3001;
    server_name localhost api.yourdomain.com;

    client_max_body_size 50M;

    location / {
      proxy_pass         http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }
}
